name: Deploy AWS RDS

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Apply Terraform changes"
        required: true
        type: boolean
        default: true

permissions:
  contents: read

env:
  TF_WORKING_DIR: infra/terraform/aws
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  TF_VAR_aws_region: ${{ vars.AWS_REGION || 'us-east-1' }}
  TF_VAR_project_name: ${{ vars.RDS_PROJECT_NAME || 'db-agent' }}
  TF_VAR_allowed_cidr_blocks: ${{ vars.RDS_ALLOWED_CIDR_BLOCKS_JSON || '["0.0.0.0/0"]' }}
  TF_VAR_publicly_accessible: "true"
  TF_VAR_database_name: ${{ vars.RDS_DATABASE_NAME || 'db_agent' }}
  TF_VAR_database_username: ${{ vars.RDS_DATABASE_USERNAME || 'dbagent' }}
  TF_VAR_database_password: ${{ secrets.RDS_DATABASE_PASSWORD }}

jobs:
  rds:
    name: Provision RDS and update app config
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_BACKEND_BUCKET: ${{ vars.TF_BACKEND_BUCKET }}
          TF_BACKEND_KEY: ${{ vars.TF_BACKEND_KEY || 'db-agent/aws-rds.tfstate' }}
          TF_BACKEND_DYNAMODB_TABLE: ${{ vars.TF_BACKEND_DYNAMODB_TABLE }}
        run: |
          if [ -n "$TF_BACKEND_BUCKET" ]; then
            printf 'terraform {\n  backend "s3" {}\n}\n' > backend.generated.tf
            BACKEND_ARGS=(
              "-backend-config=bucket=$TF_BACKEND_BUCKET"
              "-backend-config=key=$TF_BACKEND_KEY"
              "-backend-config=region=$AWS_REGION"
            )
            if [ -n "$TF_BACKEND_DYNAMODB_TABLE" ]; then
              BACKEND_ARGS+=("-backend-config=dynamodb_table=$TF_BACKEND_DYNAMODB_TABLE")
            fi
            terraform init "${BACKEND_ARGS[@]}"
          else
            terraform init
          fi

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -out=tfplan

      - name: Terraform apply
        if: inputs.apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve tfplan

      - name: Build DB_URL
        if: inputs.apply
        id: db-url
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          DB_USER: ${{ env.TF_VAR_database_username }}
          DB_PASS: ${{ secrets.RDS_DATABASE_PASSWORD }}
        run: |
          DB_HOST="$(terraform output -raw database_host)"
          DB_PORT="$(terraform output -raw database_port)"
          DB_NAME="$(terraform output -raw database_name)"
          DB_URL="$(DB_HOST="$DB_HOST" DB_PORT="$DB_PORT" DB_NAME="$DB_NAME" python3 -c "import os; from urllib.parse import quote; print(f\"postgresql+psycopg://{quote(os.environ['DB_USER'], safe='')}:{quote(os.environ['DB_PASS'], safe='')}@{os.environ['DB_HOST']}:{os.environ['DB_PORT']}/{os.environ['DB_NAME']}\")")"
          echo "::add-mask::$DB_URL"
          echo "db_url=$DB_URL" >> "$GITHUB_OUTPUT"

      - name: Set up kubectl
        if: inputs.apply
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        if: inputs.apply
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          mkdir -p "$HOME/.kube"
          printf '%s' "$KUBECONFIG_DATA" > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Update DB Agent Kubernetes secret
        if: inputs.apply
        env:
          DB_URL: ${{ steps.db-url.outputs.db_url }}
        run: |
          kubectl apply -f deploy/k8s/base/namespace.yaml
          kubectl create secret generic db-agent-secrets \
            --namespace db-agent \
            --from-literal=DB_URL="$DB_URL" \
            --dry-run=client \
            -o yaml | kubectl apply -f -

      - name: Restart DB Agent deployment
        if: inputs.apply
        run: |
          if kubectl get deployment/db-agent --namespace db-agent; then
            kubectl rollout restart deployment/db-agent --namespace db-agent
            kubectl rollout status deployment/db-agent --namespace db-agent --timeout=180s
          else
            echo "Deployment db-agent does not exist yet; DB_URL secret is ready for the next app deploy."
          fi
