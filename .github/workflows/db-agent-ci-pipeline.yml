name: Build, scan, push, and deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write   # CodeQL sarif upload
  packages: write          # Docker Hub via GHCR fallback if needed

env:
  IMAGE_NAME: becloudready/db-agent
  REGISTRY: docker.io
  PYTHON_VERSION: "3.11"

jobs:

  # ─────────────────────────────────────────────
  # JOB 1: Static analysis — runs on every PR/push
  # Fast feedback before the expensive docker build
  # ─────────────────────────────────────────────
  code-scan:
    name: CodeQL static analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for accurate blame in alerts

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-extended   # catches injection, hardcoded secrets, insecure patterns

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
          output: sarif-results
          upload: failure-only   # only upload if findings exist (keeps SARIF tab clean)

  # ─────────────────────────────────────────────
  # JOB 2: Build, push to Docker Hub, then scan container
  # Only on push to main (not PRs — no secrets available)
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build, push, and scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: code-scan           # block build if CodeQL finds critical issues

    # Skip on PRs — Docker Hub secrets not available in fork PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      image-digest: ${{ steps.push.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        # Needed for multi-arch builds (arm64 emulation on amd64 runner)

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:latest

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        # DOCKERHUB_TOKEN is a Docker Hub access token (not password)
        # Settings → Security → New Access Token → Read/Write scope

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=long
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.title=db-agent
            org.opencontainers.image.description=Text-to-SQL AI agent on Databricks
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push multi-arch image to Docker Hub
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true         # attach SLSA provenance attestation
          sbom: true               # generate and attach SBOM to the image
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_SHA=${{ github.sha }}

      - name: Trivy — scan for OS + library CVEs
        id: trivy-cve
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: "0"           # report vulnerabilities without blocking deploy
          ignore-unfixed: true     # skip CVEs with no fix available
          severity: CRITICAL,HIGH
          timeout: 10m

      - name: Trivy — scan for secrets in image layers
        id: trivy-secrets
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          scanners: secret
          format: table
          exit-code: "0"           # report secrets without blocking deploy

      - name: Trivy — upload SARIF to GitHub Security tab
        uses: aquasecurity/trivy-action@master
        if: always()               # upload even if previous scan failed
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-container

      - name: Print image digest
        run: |
          echo "Image pushed: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          echo "Digest: ${{ steps.push.outputs.digest }}"
          echo "Tags: ${{ steps.meta.outputs.tags }}"

  # ─────────────────────────────────────────────
  # JOB 3: Deploy to DigitalOcean Kubernetes
  # Uses the full kubeconfig stored in the KUBECONFIG GitHub secret
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-and-push
    if: success()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          mkdir -p "$HOME/.kube"
          printf '%s' "$KUBECONFIG_DATA" > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Apply Kubernetes namespace
        run: |
          kubectl apply -f k8s/namespace.yaml
          for i in {1..30}; do
            if kubectl get namespace db-agent -o jsonpath='{.status.phase}' | grep -q Active; then
              exit 0
            fi
            sleep 2
          done
          echo "Namespace db-agent did not become Active in time"
          exit 1

      - name: Apply Kubernetes workload
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      - name: Deploy pushed image
        run: |
          kubectl set image deployment/db-agent db-agent=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} --namespace db-agent
          kubectl rollout status deployment/db-agent --namespace db-agent --timeout=180s

  # ─────────────────────────────────────────────
  # JOB 4: Notify deploy workflow
  # Writes the deployed image digest to job summary
  # ─────────────────────────────────────────────
  notify:
    name: Summary
    runs-on: ubuntu-latest
    needs:
      - build-and-push
      - deploy
    if: success()

    steps:
      - name: Write job summary
        run: |
          echo "## Build complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| SHA tag | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Digest | \`${{ needs.build-and-push.outputs.image-digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy | Completed in report-only mode |" >> $GITHUB_STEP_SUMMARY
          echo "| CodeQL | Completed |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Image deployed to DigitalOcean Kubernetes." >> $GITHUB_STEP_SUMMARY
