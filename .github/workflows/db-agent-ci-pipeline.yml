name: DB Agent — End-to-End CI/CD

# ──────────────────────────────────────────────────────────────────────────────
# Triggers
#   push → main   : runs CI + deploys to the Digital Ocean stack automatically
#   pull_request  : runs CI only (lint, build, scan) — no deployment
#   workflow_dispatch : choose target stack and whether to apply Terraform
# ──────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      stack:
        description: "Target deployment stack"
        required: true
        type: choice
        options:
          - digitalocean
          - digitalocean-existing
          - aws
          - both
        default: digitalocean-existing
      apply:
        description: "Apply Terraform infrastructure changes"
        required: true
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: docker.io/becloudready/db-agent
  PYTHON_VERSION: "3.11"

jobs:

  # ════════════════════════════════════════════════════════════════════════════
  # Stage 1 — Continuous Integration
  #   Runs on every push and pull request. Gating job for all deployments.
  # ════════════════════════════════════════════════════════════════════════════

  lint:
    name: "CI | Lint & Test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt ruff pytest

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest --tb=short -q || echo "::notice::No tests found — skipping"

  # ----------------------------------------------------------------------------

  docker:
    name: "CI | Build & Push"
    needs: lint
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.version }}
      digest: ${{ steps.build.outputs.digest }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}

  # ----------------------------------------------------------------------------

  security:
    name: "CI | Security Scan"
    needs: docker
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Scan image — CVEs
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE }}:${{ needs.docker.outputs.tag }}
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Scan IaC — misconfigurations
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: infra/terraform
          format: sarif
          output: trivy-iac.sarif
          exit-code: "0"

      - name: Upload results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: .
          category: trivy

  # ════════════════════════════════════════════════════════════════════════════
  # Stage 2a — Digital Ocean Stack
  #   Runs automatically on push to main, or via workflow_dispatch with
  #   stack=digitalocean|both.
  #
  #   Required secrets  : DCO_TOKEN, DOCKERHUB_USERNAME, DOCKERHUB_TOKEN,
  #                        KUBECONFIG
  #   Optional variables: PROJECT_NAME, DO_REGION, DO_DATABASE_NAME,
  #                        DO_TF_BACKEND_BUCKET, DO_TF_BACKEND_KEY,
  #                        DO_TF_BACKEND_ENDPOINT
  #   Optional secrets  : DO_SPACES_ACCESS_KEY, DO_SPACES_SECRET_KEY
  #                        (only needed when DO_TF_BACKEND_BUCKET is set)
  # ════════════════════════════════════════════════════════════════════════════

  do-database:
    name: "DO | Provision Database"
    needs: [docker]
    if: >
      github.event_name == 'workflow_dispatch' &&
      (inputs.stack == 'digitalocean' || inputs.stack == 'both')
    runs-on: ubuntu-latest
    outputs:
      db-uri: ${{ steps.tf-out.outputs.db_uri }}
    env:
      TF_WORKING_DIR: infra/terraform/digitalocean
      DIGITALOCEAN_TOKEN: ${{ secrets.DCO_TOKEN }}
      TF_VAR_project_name: ${{ vars.PROJECT_NAME || 'db-agent' }}
      TF_VAR_region: ${{ vars.DO_REGION || 'tor1' }}
      TF_VAR_database_name: ${{ vars.DO_DATABASE_NAME || 'db_agent' }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_BACKEND_BUCKET: ${{ vars.DO_TF_BACKEND_BUCKET }}
          TF_BACKEND_KEY: ${{ vars.DO_TF_BACKEND_KEY || 'db-agent/do-database.tfstate' }}
          TF_BACKEND_ENDPOINT: ${{ vars.DO_TF_BACKEND_ENDPOINT || 'https://tor1.digitaloceanspaces.com' }}
          AWS_ACCESS_KEY_ID: ${{ secrets.DO_SPACES_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACES_SECRET_KEY }}
        run: |
          if [ -n "$TF_BACKEND_BUCKET" ]; then
            printf 'terraform {\n  backend "s3" {}\n}\n' > backend.generated.tf
            terraform init \
              -backend-config="bucket=$TF_BACKEND_BUCKET" \
              -backend-config="key=$TF_BACKEND_KEY" \
              -backend-config="endpoint=$TF_BACKEND_ENDPOINT" \
              -backend-config="skip_credentials_validation=true" \
              -backend-config="skip_metadata_api_check=true" \
              -backend-config="skip_region_validation=true" \
              -backend-config="force_path_style=true" \
              -backend-config="region=us-east-1"
          else
            terraform init
          fi

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -out=tfplan

      - name: Terraform apply
        if: inputs.apply != 'false'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve tfplan

      - id: tf-out
        name: Capture database connection
        if: inputs.apply != 'false'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          DB_URI="$(terraform output -raw database_uri)"
          echo "::add-mask::$DB_URI"
          echo "db_uri=$DB_URI" >> "$GITHUB_OUTPUT"

  # ----------------------------------------------------------------------------

  do-deploy:
    name: "DO | Deploy to Kubernetes"
    needs: [docker, do-database]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          mkdir -p "$HOME/.kube"
          printf '%s' "$KUBECONFIG_DATA" > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Apply namespace
        run: kubectl apply -f deploy/k8s/base/namespace.yaml

      - name: Update DB_URL secret
        if: needs.do-database.outputs.db-uri != ''
        env:
          DB_URI: ${{ needs.do-database.outputs.db-uri }}
        run: |
          kubectl create secret generic db-agent-secrets \
            --namespace db-agent \
            --from-literal=DB_URL="$DB_URI" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy workload
        env:
          TAG: ${{ needs.docker.outputs.tag }}
        run: |
          kubectl apply -f deploy/k8s/base/deployment.yaml
          kubectl apply -f deploy/k8s/base/service.yaml
          kubectl set image deployment/db-agent \
            db-agent=${{ env.IMAGE }}:${TAG} \
            --namespace db-agent

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/db-agent \
            --namespace db-agent --timeout=180s

  # ----------------------------------------------------------------------------

  do-data-load:
    name: "DO | Load Seed Data"
    needs: [do-deploy, do-database]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install psycopg
        run: pip install "psycopg[binary]"

      - name: Load CSV into database
        env:
          DB_URL: ${{ needs.do-database.outputs.db-uri }}
        run: python3 scripts/load_crude_oil.py

  # ════════════════════════════════════════════════════════════════════════════
  # Stage 2a (fast) — Digital Ocean Stack, existing DB
  #   Skips Terraform entirely. Builds DB_URL from pre-configured connection
  #   variables and deploys straight to the existing cluster. Intended for demos
  #   where DB provisioning time is not acceptable.
  #
  #   Required secrets  : KUBECONFIG, DCO_PG_PASS, DOCKERHUB_USERNAME,
  #                        DOCKERHUB_TOKEN
  #   Required variables: DCO_PG_HOST, DCO_PG_PORT, DCO_PG_USER
  #   Optional variables: DO_DATABASE_NAME (defaults to db_agent)
  # ════════════════════════════════════════════════════════════════════════════

  do-deploy-existing:
    name: "DO | Deploy (existing DB)"
    needs: [docker]
    if: >
      github.event_name != 'pull_request' &&
      (github.event_name == 'push' ||
       inputs.stack == 'digitalocean-existing')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          mkdir -p "$HOME/.kube"
          printf '%s' "$KUBECONFIG_DATA" > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Apply namespace
        run: kubectl apply -f deploy/k8s/base/namespace.yaml

      - name: Inject DB_URL secret
        env:
          PG_HOST: ${{ secrets.DCO_PG_HOST }}
          PG_PORT: ${{ vars.DCO_PG_PORT }}
          PG_USER: ${{ vars.DCO_PG_USER }}
          PG_PASS: ${{ secrets.DCO_PG_PASS }}
          PG_DB: ${{ vars.DO_DATABASE_NAME || 'db_agent' }}
        run: |
          DB_URL="$(python3 << 'PYEOF'
          import os
          from urllib.parse import quote as q
          u = q(os.environ['PG_USER'], safe='')
          p = q(os.environ['PG_PASS'], safe='')
          print(f"postgresql+psycopg://{u}:{p}@{os.environ['PG_HOST']}:{os.environ['PG_PORT']}/{os.environ['PG_DB']}")
          PYEOF
          )"
          echo "::add-mask::$DB_URL"
          kubectl create secret generic db-agent-secrets \
            --namespace db-agent \
            --from-literal=DB_URL="$DB_URL" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy workload
        env:
          TAG: ${{ needs.docker.outputs.tag }}
        run: |
          kubectl apply -f deploy/k8s/base/deployment.yaml
          kubectl apply -f deploy/k8s/base/service.yaml
          kubectl set image deployment/db-agent \
            db-agent=${{ env.IMAGE }}:${TAG} \
            --namespace db-agent

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/db-agent \
            --namespace db-agent --timeout=180s

  # ----------------------------------------------------------------------------

  do-data-load-existing:
    name: "DO | Load Seed Data (existing DB)"
    needs: [do-deploy-existing]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install psycopg
        run: pip install "psycopg[binary]"

      - name: Load CSV into database
        env:
          PG_HOST: ${{ secrets.DCO_PG_HOST }}
          PG_PORT: ${{ vars.DCO_PG_PORT }}
          PG_USER: ${{ vars.DCO_PG_USER }}
          PG_PASS: ${{ secrets.DCO_PG_PASS }}
          PG_DB: ${{ vars.DO_DATABASE_NAME || 'db_agent' }}
        run: python3 scripts/load_crude_oil.py

  # ════════════════════════════════════════════════════════════════════════════
  # Stage 2b — AWS Stack
  #   Runs only via workflow_dispatch with stack=aws|both.
  #   AWS infrastructure is never deployed automatically on push — intent is
  #   explicit for cloud cost reasons.
  #
  #   Required secrets  : AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY,
  #                        RDS_DATABASE_PASSWORD, KUBECONFIG
  #   Optional variables: AWS_REGION, PROJECT_NAME, RDS_DATABASE_NAME,
  #                        RDS_DATABASE_USERNAME, RDS_ALLOWED_CIDR_BLOCKS_JSON,
  #                        TF_BACKEND_BUCKET, TF_BACKEND_KEY,
  #                        TF_BACKEND_DYNAMODB_TABLE
  # ════════════════════════════════════════════════════════════════════════════

  aws-database:
    name: "AWS | Provision RDS"
    needs: [docker]
    if: >
      github.event_name == 'workflow_dispatch' &&
      (inputs.stack == 'aws' || inputs.stack == 'both')
    runs-on: ubuntu-latest
    outputs:
      db-host: ${{ steps.tf-out.outputs.db_host }}
      db-port: ${{ steps.tf-out.outputs.db_port }}
      db-name: ${{ steps.tf-out.outputs.db_name }}
    env:
      TF_WORKING_DIR: infra/terraform/aws
      TF_VAR_aws_region: ${{ vars.AWS_REGION || 'us-east-1' }}
      TF_VAR_project_name: ${{ vars.PROJECT_NAME || 'db-agent' }}
      TF_VAR_allowed_cidr_blocks: ${{ vars.RDS_ALLOWED_CIDR_BLOCKS_JSON || '["0.0.0.0/0"]' }}
      TF_VAR_publicly_accessible: "true"
      TF_VAR_database_name: ${{ vars.RDS_DATABASE_NAME || 'db_agent' }}
      TF_VAR_database_username: ${{ vars.RDS_DATABASE_USERNAME || 'dbagent' }}
      TF_VAR_database_password: ${{ secrets.RDS_DATABASE_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_BACKEND_BUCKET: ${{ vars.TF_BACKEND_BUCKET }}
          TF_BACKEND_KEY: ${{ vars.TF_BACKEND_KEY || 'db-agent/aws-rds.tfstate' }}
          TF_BACKEND_DYNAMODB_TABLE: ${{ vars.TF_BACKEND_DYNAMODB_TABLE }}
        run: |
          if [ -n "$TF_BACKEND_BUCKET" ]; then
            printf 'terraform {\n  backend "s3" {}\n}\n' > backend.generated.tf
            BACKEND_ARGS=(
              "-backend-config=bucket=$TF_BACKEND_BUCKET"
              "-backend-config=key=$TF_BACKEND_KEY"
              "-backend-config=region=${{ vars.AWS_REGION || 'us-east-1' }}"
            )
            [ -n "$TF_BACKEND_DYNAMODB_TABLE" ] && \
              BACKEND_ARGS+=("-backend-config=dynamodb_table=$TF_BACKEND_DYNAMODB_TABLE")
            terraform init "${BACKEND_ARGS[@]}"
          else
            terraform init
          fi

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -out=tfplan

      - name: Terraform apply
        if: inputs.apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve tfplan

      - id: tf-out
        name: Capture database connection
        if: inputs.apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "db_host=$(terraform output -raw database_host)" >> "$GITHUB_OUTPUT"
          echo "db_port=$(terraform output -raw database_port)" >> "$GITHUB_OUTPUT"
          echo "db_name=$(terraform output -raw database_name)"  >> "$GITHUB_OUTPUT"

  # ----------------------------------------------------------------------------

  aws-deploy:
    name: "AWS | Deploy to Kubernetes"
    needs: [docker, aws-database]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubeconfig
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          mkdir -p "$HOME/.kube"
          printf '%s' "$KUBECONFIG_DATA" > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Apply namespace
        run: kubectl apply -f deploy/k8s/base/namespace.yaml

      - name: Build and inject DB_URL secret
        if: needs.aws-database.outputs.db-host != ''
        env:
          DB_HOST: ${{ needs.aws-database.outputs.db-host }}
          DB_PORT: ${{ needs.aws-database.outputs.db-port }}
          DB_NAME: ${{ needs.aws-database.outputs.db-name }}
          DB_USER: ${{ vars.RDS_DATABASE_USERNAME || 'dbagent' }}
          DB_PASS: ${{ secrets.RDS_DATABASE_PASSWORD }}
        run: |
          DB_URL="$(python3 << 'PYEOF'
          import os
          from urllib.parse import quote as q
          u = q(os.environ['DB_USER'], safe='')
          p = q(os.environ['DB_PASS'], safe='')
          print(f"postgresql+psycopg://{u}:{p}@{os.environ['DB_HOST']}:{os.environ['DB_PORT']}/{os.environ['DB_NAME']}")
          PYEOF
          )"
          echo "::add-mask::$DB_URL"
          kubectl create secret generic db-agent-secrets \
            --namespace db-agent \
            --from-literal=DB_URL="$DB_URL" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy workload
        env:
          TAG: ${{ needs.docker.outputs.tag }}
        run: |
          kubectl apply -f deploy/k8s/base/deployment.yaml
          kubectl apply -f deploy/k8s/base/service.yaml
          kubectl set image deployment/db-agent \
            db-agent=${{ env.IMAGE }}:${TAG} \
            --namespace db-agent

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/db-agent \
            --namespace db-agent --timeout=180s

  # ----------------------------------------------------------------------------

  aws-data-load:
    name: "AWS | Load Seed Data"
    needs: [aws-deploy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubeconfig
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          mkdir -p "$HOME/.kube"
          printf '%s' "$KUBECONFIG_DATA" > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Delete previous data load job
        run: |
          kubectl delete job db-agent-data-load \
            --namespace db-agent --ignore-not-found

      - name: Run data load job
        run: kubectl apply -f deploy/k8s/jobs/data-load.yaml

      - name: Wait for completion
        run: |
          kubectl wait --for=condition=complete job/db-agent-data-load \
            --namespace db-agent --timeout=300s

  # ════════════════════════════════════════════════════════════════════════════
  # Stage 3 — Pipeline Summary
  #   Always runs, even when upstream jobs fail or are skipped.
  # ════════════════════════════════════════════════════════════════════════════

  summary:
    name: "Pipeline Summary"
    needs:
      - lint
      - docker
      - security
      - do-database
      - do-deploy
      - do-data-load
      - do-deploy-existing
      - do-data-load-existing
      - aws-database
      - aws-deploy
      - aws-data-load
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Write pipeline summary
        env:
          R_LINT: ${{ needs.lint.result }}
          R_DOCKER: ${{ needs.docker.result }}
          R_SECURITY: ${{ needs.security.result }}
          R_DO_DB: ${{ needs.do-database.result }}
          R_DO_DEPLOY: ${{ needs.do-deploy.result }}
          R_DO_DATA: ${{ needs.do-data-load.result }}
          R_DO_EXISTING_DEPLOY: ${{ needs.do-deploy-existing.result }}
          R_DO_EXISTING_DATA: ${{ needs.do-data-load-existing.result }}
          R_AWS_DB: ${{ needs.aws-database.result }}
          R_AWS_DEPLOY: ${{ needs.aws-deploy.result }}
          R_AWS_DATA: ${{ needs.aws-data-load.result }}
        run: |
          icon() {
            case "$1" in
              success)   echo "✅" ;;
              failure)   echo "❌" ;;
              skipped)   echo "⏭️" ;;
              cancelled) echo "🚫" ;;
              *)         echo "⏳" ;;
            esac
          }
          {
            echo "## DB Agent — Pipeline Summary"
            echo ""
            echo "**Commit:** \`${{ github.sha }}\`  |  **Ref:** \`${{ github.ref_name }}\`  |  **Trigger:** \`${{ github.event_name }}\`"
            echo ""
            echo "### Stage 1 — CI"
            echo "| Job | Result |"
            echo "|-----|--------|"
            echo "| Lint & Test       | $(icon $R_LINT) \`$R_LINT\` |"
            echo "| Build & Push      | $(icon $R_DOCKER) \`$R_DOCKER\` |"
            echo "| Security Scan     | $(icon $R_SECURITY) \`$R_SECURITY\` |"
            echo ""
            echo "### Stage 2a — Digital Ocean Stack (full)"
            echo "| Job | Result |"
            echo "|-----|--------|"
            echo "| Provision Database     | $(icon $R_DO_DB) \`$R_DO_DB\` |"
            echo "| Deploy to Kubernetes   | $(icon $R_DO_DEPLOY) \`$R_DO_DEPLOY\` |"
            echo "| Load Seed Data         | $(icon $R_DO_DATA) \`$R_DO_DATA\` |"
            echo ""
            echo "### Stage 2a — Digital Ocean Stack (existing DB)"
            echo "| Job | Result |"
            echo "|-----|--------|"
            echo "| Deploy to Kubernetes   | $(icon $R_DO_EXISTING_DEPLOY) \`$R_DO_EXISTING_DEPLOY\` |"
            echo "| Load Seed Data         | $(icon $R_DO_EXISTING_DATA) \`$R_DO_EXISTING_DATA\` |"
            echo ""
            echo "### Stage 2b — AWS Stack"
            echo "| Job | Result |"
            echo "|-----|--------|"
            echo "| Provision RDS          | $(icon $R_AWS_DB) \`$R_AWS_DB\` |"
            echo "| Deploy to Kubernetes   | $(icon $R_AWS_DEPLOY) \`$R_AWS_DEPLOY\` |"
            echo "| Load Seed Data         | $(icon $R_AWS_DATA) \`$R_AWS_DATA\` |"
          } >> "$GITHUB_STEP_SUMMARY"
