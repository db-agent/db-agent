name: DB Agent — EKS Deploy

# ──────────────────────────────────────────────────────────────────────────────
# Manual trigger only. Deploys the Docker Hub image to an existing EKS cluster.
#
# Required secrets (GitHub → Settings → Secrets):
#   AWS_ACCESS_KEY_ID     — IAM key with EKS permissions
#   AWS_SECRET_ACCESS_KEY — Corresponding secret
#   DB_URL                — postgresql://user:pass@host:5432/db_agent
#   LLM_API_KEY           — LLM provider API key
#
# Required variables (GitHub → Settings → Variables):
#   AWS_REGION            — e.g. us-east-1
#   EKS_CLUSTER_NAME      — e.g. db-agent-eks
#   LLM_BASE_URL          — OpenAI-compatible endpoint
#   LLM_MODEL             — model name
#
# Optional variables:
#   DOCKER_IMAGE          — Docker Hub image (default: becloudready/db-agent:latest)
#   DBAGENT_MODEL_CHAIN   — comma-separated failover chain
# ──────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: "AWS region"
        required: false
        default: "us-east-1"
      eks_cluster_name:
        description: "EKS cluster name"
        required: false
        default: "db-agent-eks"
      image_tag:
        description: "Docker Hub image tag to deploy"
        required: false
        default: "latest"

concurrency:
  group: eks-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:

  deploy:
    name: "K8s | Deploy to EKS"
    runs-on: ubuntu-latest
    env:
      AWS_REGION:       ${{ inputs.aws_region }}
      EKS_CLUSTER_NAME: ${{ inputs.eks_cluster_name }}
      IMAGE:            becloudready/db-agent:${{ inputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --region "$AWS_REGION" --name "$EKS_CLUSTER_NAME"

      - name: Apply namespace
        run: kubectl apply -f deploy/k8s/base/namespace.yaml

      - name: Upsert app secret
        run: |
          kubectl create secret generic db-agent-secrets \
            --namespace db-agent \
            --from-literal=DB_URL="${{ secrets.DB_URL }}" \
            --from-literal=LLM_API_KEY="${{ secrets.LLM_API_KEY }}" \
            --from-literal=LLM_BASE_URL="${{ vars.LLM_BASE_URL }}" \
            --from-literal=LLM_MODEL="${{ vars.LLM_MODEL }}" \
            --from-literal=DBAGENT_MODEL_CHAIN="${{ vars.DBAGENT_MODEL_CHAIN }}" \
            --save-config --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply service
        run: kubectl apply -f deploy/k8s/base/service.yaml

      - name: Deploy
        run: |
          sed "s|image: .*|image: $IMAGE|" deploy/k8s/base/deployment.yaml \
            | kubectl apply -f -

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/db-agent \
            --namespace db-agent \
            --timeout=300s

      - name: Get app URL
        id: url
        run: |
          for i in $(seq 1 12); do
            ENDPOINT=$(kubectl get svc db-agent -n db-agent \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
            [ -n "$ENDPOINT" ] && break
            echo "Waiting for LoadBalancer... ($i/12)"
            sleep 10
          done
          echo "endpoint=${ENDPOINT:-(pending)}" >> "$GITHUB_OUTPUT"

      - name: Step summary
        run: |
          {
            echo "### DB Agent deployed ✅"
            echo "| | |"
            echo "|---|---|"
            echo "| **Cluster** | \`$EKS_CLUSTER_NAME\` |"
            echo "| **Image**   | \`$IMAGE\` |"
            echo "| **URL**     | http://${{ steps.url.outputs.endpoint }} |"
            echo "| **Commit**  | \`${{ github.sha }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
